8px;row-gap:8px;min-width:0;width:100%;padding:10px;border:1px solid hsl(0 0% 100%/0.18);border-radius:8px;background:radial-gradient(circle at 16% 0%,hsl(337 91% 66%/0.18),transparent 46%),linear-gradient(145deg,hsl(226 34% 16%/0.78),hsl(255 35% 16%/0.58));box-shadow:inset 0 1px 0 hsl(0 0% 100%/0.16),0 16px 42px hsl(236 80% 5%/0.3);backdrop-filter:blur(20px) saturate(1.18)}.senpai-status__meter-panel:hover{border-color:hsl(188 94% 66%/0.42)}.senpai-status__meter-heading{display:flex;align-items:center;flex:0 0 auto;flex-direction:column;grid-column:1/-1;gap:5px;text-align:center}.senpai-status__kicker{margin:0;color:var(--senpai-cyan);font-size:11px;font-weight:850}.senpai-status__meter-heading h2{margin:0;color:var(--senpai-ink);font-size:15px;line-height:1.05;white-space:nowrap}.senpai-status__meter-number{flex:0 0 auto;color:var(--senpai-gold);font-size:22px;font-weight:900;line-height:0.92;font-variant-numeric:tabular-nums;text-shadow:0 0 24px hsl(42 94% 65%/0.34)}.senpai-status__meter{position:relative;overflow:hidden;grid-row:3;grid-column:1;flex:1 1 auto;width:100%;min-height:0;border:1px solid hsl(0 0% 100%/0.3);border-radius:8px;background:linear-gradient(180deg,hsl(230 30% 8%/0.88),hsl(235 24% 14%/0.78)),repeating-linear-gradient(90deg,transparent 0 11%,hsl(0 0% 100%/0.05) 11% 11.5%);box-shadow:inset 0 10px 22px hsl(235 80% 4%/0.44),0 0 0 1px hsl(0 0% 100%/0.05)}.senpai-status__meter-fill{position:absolute;inset:auto 0 0;overflow:hidden;width:100%;height:0%;border-radius:7px;background:radial-gradient(circle at 18% 30%,hsl(0 0% 100%/0.98) 0 10%,transparent 11%),radial-gradient(circle at 52% 72%,hsl(44 100% 96%/0.7) 0 7%,transparent 8%),linear-gradient(180deg,hsl(42 100% 98%),hsl(36 72% 88%) 46%,hsl(0 0% 100%) 100%);box-shadow:0 0 26px hsl(42 92% 86%/0.36),inset 0 1px 0 hsl(0 0% 100%/0.9),inset 0 -10px 18px hsl(38 76% 74%/0.24);transition:height 760ms cubic-bezier(0.22,1,0.36,1)}.senpai-status__meter-fill::before{content:'';position:absolute;inset:-65% -20% 38%;border-radius:42%;background:hsl(0 0% 100%/0.62);animation:senpai-status-fluid 5.2s ease-in-out infinite}.senpai-status__meter-fill::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 45%,hsl(0 0% 100%/0.72) 0 2px,transparent 3px),radial-gradient(circle at 48% 36%,hsl(0 0% 100%/0.54) 0 1.5px,transparent 2.5px),radial-gradient(circle at 75% 56%,hsl(0 0% 100%/0.64) 0 2px,transparent 3px);background-size:120px 42px;animation:senpai-status-bubbles 6s linear infinite;opacity:0.75}.senpai-status__meter-glass{position:absolute;inset:0;background:linear-gradient(180deg,hsl(0 0% 100%/0.28),transparent 48%),linear-gradient(90deg,transparent,hsl(0 0% 100%/0.18),transparent);mix-blend-mode:screen;transform:translateX(-120%);animation:senpai-status-sheen 4.8s ease-in-out infinite}.senpai-status__meter-scale{display:contents;color:hsl(222 22% 72%);font-size:11px;font-weight:750;text-align:center}.senpai-status__meter-scale span{display:block;padding:2px 0}.senpai-status__meter-scale span:first-child{grid-row:2;grid-column:1}.senpai-status__meter-scale span:last-child{grid-row:4;grid-column:1}@keyframes senpai-status-fluid{0%,100%{transform:translateX(-7%) rotate(0deg)}50%{transform:translateX(7%) rotate(7deg)}}@keyframes senpai-status-bubbles{from{background-position:0 18px}to{background-position:120px -22px}}@keyframes senpai-status-sheen{0%,48%{transform:translateX(-120%)}72%,100%{transform:translateX(120%)}}@media (max-width:500px){.senpai-status,.senpai-status__shell{width:min(100%,460px)}.senpai-status__layout{grid-template-columns:minmax(0,1fr) 96px}}@media (max-width:360px){.senpai-status__topbar{grid-template-columns:1fr}}@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:1ms !important;animation-iteration-count:1 !important;scroll-behavior:auto !important;transition-duration:1ms !important}}

</style></head>
<body>
  <main id="senpai-status-root" class="senpai-status" aria-labelledby="senpai-status-title">
    <section class="senpai-status__shell">
      <h1 id="senpai-status-title" class="senpai-status__title">状态栏</h1>

      <div class="senpai-status__layout">
        <div class="senpai-status__left">
          <header class="senpai-status__topbar" aria-label="时间与地点">
            <div class="senpai-status__time">
              <span class="senpai-status__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M12 7v5l3.2 1.9" />
                  <path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>
              </span>
              <span id="senpai-status-time" class="senpai-status__time-value"></span>
              <span id="senpai-status-weekday" class="senpai-status__weekday"></span>
            </div>
            <div class="senpai-status__place">
              <span class="senpai-status__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M20 10c0 5.5-8 11-8 11S4 15.5 4 10a8 8 0 1 1 16 0Z" />
                  <path d="M12 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />
                </svg>
              </span>
              <span id="senpai-status-location"></span>
            </div>
          </header>

          <button id="senpai-status-portrait" class="senpai-status__portrait" type="button" aria-label="随机切换立绘">
            <img id="senpai-status-portrait-image" class="senpai-status__portrait-image" alt="前辈立绘" />
          </button>
        </div>

        <section class="senpai-status__meter-panel" aria-labelledby="senpai-status-meter-title">
          <div class="senpai-status__meter-heading">
            <p class="senpai-status__kicker">主角状态</p>
            <h2 id="senpai-status-meter-title">精液存量</h2>
            <output id="senpai-status-semen-output" class="senpai-status__meter-number" for="senpai-status-semen-fill">
              0%
            </output>
          </div>

          <div
            id="senpai-status-semen-meter"
            class="senpai-status__meter"
            role="meter"
            aria-label="主角精液存量"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
            aria-orientation="vertical"
          >
            <div id="senpai-status-semen-fill" class="senpai-status__meter-fill"></div>
            <div class="senpai-status__meter-glass" aria-hidden="true"></div>
          </div>

          <div class="senpai-status__meter-scale" aria-hidden="true">
            <span>盈满</span>
            <span>空</span>
          </div>
        </section>
      </div>
    </section>
  </main>
</body>
